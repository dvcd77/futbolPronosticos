# Pronosticador Mundial 2026 — Render Web Service (Node.js)
#
# Cambiado de "static" a "web" para poder usar el proxy que resuelve CORS:
#   Browser → /api/football/* → server.js → api.football-data.org
#
# El tier gratuito de Render web service se suspende tras 15 min de inactividad
# (primer request después de suspensión toma ~30 s). Comportamiento normal.

services:
  - type: web
    name: pronosticador-mundial-2026
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
